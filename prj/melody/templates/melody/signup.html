{% extends 'melody/landing_page.html' %} {% block content %}
<div class="row justify-content-center w-100">
    <div class="col-md-4">
        <div class="card bg-dark text-light border-secondary shadow">
            <div class="card-body p-4">
                <h2 class="text-success fw-bold mb-4">Vytvořit účet</h2>
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100 mt-3">Registrovat se</button>
                </form>
                <p class="mt-3 text-center small text-secondary">
                    Již máte účet? <a href="{% url 'admin:index' %}" class="text-success">Přihlaste se</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
