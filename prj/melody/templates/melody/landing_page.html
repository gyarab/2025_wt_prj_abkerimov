<!DOCTYPE html>
<html lang="cs" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Vítejte | MelodyStream</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="text-center w-100 px-3">
        {% block content %}
        <h1 class="display-3 text-success fw-bold mb-3">MelodyStream</h1>
        <p class="lead mb-4">Vaše hudba, vaše pravidla. Streamujte neomezeně přímo v prohlížeči.</p>
        
        <div class="d-grid gap-2 d-md-block">
            <a href="{% url 'signup' %}" class="btn btn-success btn-lg px-5 me-md-2">Vytvořit účet zdarma</a>
            <a href="{% url 'admin:index' %}" class="btn btn-outline-light btn-lg px-5">Přihlásit se</a>
        </div>
        {% endblock %}
    </div>
</body>
</html>
